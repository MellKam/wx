name: Publish VS Code Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    # Runs the build/package steps only, without publishing to the
    # Marketplace — use this to validate the cross-platform build matrix
    # before cutting a real release.

jobs:
  build-and-package:
    name: Build & Package (${{ matrix.vscode-target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            vscode-target: win32-x64
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            vscode-target: linux-x64
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            vscode-target: darwin-x64
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            vscode-target: darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.9.0"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Build Rust LSP Server
        run: cargo build --release --manifest-path crates/wx-lsp/Cargo.toml --target ${{ matrix.rust-target }}

      - name: Copy Binary to Extension Folder
        shell: bash
        run: |
          mkdir -p vscode/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp crates/wx-lsp/target/${{ matrix.rust-target }}/release/wx-lsp.exe vscode/bin/wx-lsp.exe
          else
            cp crates/wx-lsp/target/${{ matrix.rust-target }}/release/wx-lsp vscode/bin/wx-lsp
          fi

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Package VS Code Extension
        working-directory: ./vscode
        run: npx @vscode/vsce package --target ${{ matrix.vscode-target }} --out wx-vscode-${{ matrix.vscode-target }}.vsix

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.vscode-target }}
          path: "vscode/*.vsix"

  publish:
    name: Publish to Marketplace
    needs: build-and-package
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath artifacts/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
