name: Test

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      # Catches build breaks in wx-cli/wx-fmt/wx-lsp/wx-compiler-wasm that
      # `cargo test -p wx-compiler` alone would miss until release time.
      # wx-lsp-wasm is excluded from the workspace (wasm32-only) and isn't
      # covered here.
      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace
